{% load static %}
<div class="header" style="background: #ffffff; border-bottom: 2px solid #e0f2f1; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
    
    <!-- Logo Médical -->
    <div class="header-left" style="background: #ffffff;">
        <a href="{% url 'home' %}" class="logo">
            <img src="{% static 'front-end/assets/img/dr/jmc.jpeg' %}" width="45" height="45" alt="JMC Hospital" style="border-radius: 8px; object-fit: cover;">
        </a>
    </div>
    
    <a id="toggle_btn" href="javascript:void(0);" style="color: #006064;">
        <span class="bar-icon">
            <span></span><span></span><span></span>
        </span>
    </a>
    
    <!-- Titre de l'Hôpital -->
    <div class="page-title-box">
        <h3 style="color: #006064; font-weight: 700; letter-spacing: -0.5px; margin: 0; padding-top: 10px;">
            <i class="fa fa-hospital-o mr-2"></i>JMC Hospital
        </h3>
    </div>
    
    <a id="mobile_btn" class="mobile_btn" href="#sidebar"><i class="fa fa-bars" style="color: #006064;"></i></a>
    
    <!-- Header Menu -->
    <ul class="nav user-menu">
    
        <!-- Recherche -->
        <li class="nav-item">
            <div class="top-nav-search">
                <a href="javascript:void(0);" class="responsive-search"><i class="fa fa-search"></i></a>
                <form action="#">
                    <input class="form-control" type="text" placeholder="Rechercher patient...">
                    <button class="btn" type="submit"><i class="fa fa-search"></i></button>
                </form>
            </div>
        </li>
    
        <!-- Notifications -->
        <li class="nav-item dropdown">
            <a href="#" class="dropdown-toggle nav-link" data-toggle="dropdown">
                <i class="fa fa-bell-o" style="color: #006064;"></i> <span class="badge badge-pill" style="background: #006064; color: white;">3</span>
            </a>
            <div class="dropdown-menu notifications">
                <div class="topnav-dropdown-header" style="background: #006064;">
                    <span class="notification-title" style="color: white;">Alertes JMC</span>
                </div>
                <div class="noti-content">
                    <ul class="notification-list">
                        <!-- Tes éléments de notification ici -->
                    </ul>
                </div>
            </div>
        </li>
        
        <!-- Profil Utilisateur -->
        <li class="nav-item dropdown has-arrow main-drop">
            <a href="#" class="dropdown-toggle nav-link" data-toggle="dropdown">
                <span class="user-img">
                    <img src="{% static 'back-end/assets/img/profiles/avatar-21.jpg' %}" alt="">
                    <span class="status online"></span>
                </span>
                <span style="font-weight: 600; color: #006064;">{{ user.username }}</span>
            </a>
            <div class="dropdown-menu">
                <a class="dropdown-item" href="#"><i class="fa fa-user-circle-o mr-2"></i> Mon Profil</a>
                <a class="dropdown-item" href="#"><i class="fa fa-cog mr-2"></i> Paramètres</a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item text-danger" href="{% url 'deco' %}">
                    <i class="fa fa-power-off mr-2"></i> Déconnexion
                </a>
            </div>
        </li>
    </ul>
    
    <!-- Menu Mobile -->
    <div class="dropdown mobile-user-menu">
        <a href="#" class="nav-link dropdown-toggle" data-toggle="dropdown"><i class="fa fa-ellipsis-v"></i></a>
        <div class="dropdown-menu dropdown-menu-right">
            <a class="dropdown-item" href="#">Mon Profil</a>
            <a class="dropdown-item text-danger" href="{% url 'deco' %}">Déconnexion</a>
        </div>
    </div>
</div>
