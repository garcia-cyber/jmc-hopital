<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Portail JMC</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            background: #f4f7f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px; /* Ajout d'espace pour mobile */
        }

        .main-container {
            background: white;
            display: flex;
            width: 100%;
            max-width: 800px; /* Utilisation de max-width au lieu d'une largeur fixe */
            min-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* RESPONSIVE : Mobile & Tablettes */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; height: auto; }
            .branding { padding: 30px !important; }
            .login-section { padding: 30px !important; }
        }

        /* Colonne Branding */
        .branding {
            flex: 1;
            background: #004a99;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .branding img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid rgba(255,255,255,0.2);
            object-fit: cover;
        }

        /* Colonne Formulaire */
        .login-section {
            flex: 1.5;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h2 { color: #333; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; font-size: 0.75rem; }
        
        .form-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f9f9f9;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #004a99;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="branding">
            <img src="{% static 'front-end/assets/img/dr/jmc.jpeg' %}" alt="Logo JMC">
            <h3>JMC HOSPITAL</h3>
            <p>Gestion médicale sécurisée</p>
        </div>

        <div class="login-section">
            <h2>Bienvenue</h2>
            <p>Connectez-vous pour accéder à votre espace de travail.</p>

            <form method="POST">
                {% csrf_token %}
                
                {% if msg %}
                    <div style="padding: 10px; background: #fdeaea; color: #d32f2f; border-radius: 6px; margin-bottom: 20px; font-size: 0.8rem;">
                        {{ msg }}
                    </div>
                {% endif %}

                <div class="form-group">
                    <label>NOM D'UTILISATEUR</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>MOT DE PASSE</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn-login">ACCÉDER À LA SESSION</button>
            </form>
        </div>
    </div>

    <script>
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</body>
</html>
