<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Modifier Ordonnance d'Urgence</title>
    {% load static %}
    {% include 'back-end/includes/css.html' %}
</head>
<body>
<div class="main-wrapper">
    {% include 'back-end/includes/header.html' %}
    {% include 'back-end/includes/sidebar.html' %}

    <div class="page-wrapper">
        <div class="content container-fluid">
            <div class="page-header">
                <h3 class="page-title">Modifier l'Ordonnance d'Urgence #{{ ordonnance.id }}</h3>
            </div>

            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-danger">Enregistrer</button>
                        <a href="{% url 'liste_ordonnances_urgence' %}" class="btn btn-secondary">Annuler</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% include 'back-end/includes/js.html' %}
</body>
</html>
