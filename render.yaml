services:
  - type: web
    name: jmc-hospital-erp
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn conf.wsgi:application"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SETTINGS_MODULE
        value: conf.settings
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: jmc-hospital-data
      mountPath: /data
      sizeGB: 1